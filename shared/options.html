<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Taut Options</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        padding: 1.5rem;
        max-width: 30rem;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 0.5rem;
      }
      label {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        font-size: 0.875rem;
      }
      input[type='url'] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        font-size: 1rem;
        border: 1px solid #ccc;
      }
      .presets {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .presets button {
        padding: 0.375rem 0.75rem;
        border: 1px solid #ccc;
        background: #f5f5f5;
        color: #000;
      }
      button {
        padding: 0.5rem 1rem;
        cursor: pointer;
        background: #1d1c1d;
        color: #fff;
        border: none;
        font-size: 0.875rem;
      }
    </style>
  </head>
  <body>
    <label>
      <div>App bundle URL</div>
      <input type="url" id="url" placeholder="https://jer.app/taut/taut.js" />
    </label>
    <div class="presets">
      <button id="btn-official">Official</button>
      <button id="btn-official-debug">Official (sourcemaps)</button>
      <button id="btn-dev">Dev server</button>
      <span id="btn-embedded-wrap" style="display: none">
        <button id="btn-embedded">Embedded copy</button>
      </span>
    </div>
    <button id="save">Save</button>
    <script src="options.js"></script>
  </body>
</html>
